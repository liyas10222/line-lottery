name: Keep Production Warm

on:
  schedule:
    # Render Free spins down after 15 minutes idle. Use a 5-minute offset schedule
    # to reduce the chance of GitHub cron delays crossing Render's idle window.
    - cron: "2/5 * * * *"
  workflow_dispatch:

concurrency:
  group: keep-production-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      LOTTERY_BASE_URLS: ${{ vars.LOTTERY_BASE_URLS }}
    steps:
      - name: Ping production health and lottery page
        shell: bash
        run: |
          set -uo pipefail

          urls="${LOTTERY_BASE_URLS:-https://lottery.687tfjog.com https://line-lottery-p16r.onrender.com}"
          failed=0

          for base_url in $urls; do
            base_url="${base_url%/}"

            for path in /health /lottery; do
              url="$base_url$path"
              echo "Pinging $url"
              if ! curl \
                --fail \
                --silent \
                --show-error \
                --location \
                --max-time 45 \
                --retry 3 \
                --retry-delay 5 \
                --retry-all-errors \
                --user-agent "line-lottery-keepalive/1.0" \
                "$url" >/dev/null; then
                echo "::warning::Keepalive ping failed: $url"
                failed=1
              fi
            done
          done

          exit "$failed"
