name: Keep Production Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      LOTTERY_BASE_URL: ${{ vars.LOTTERY_BASE_URL }}
    steps:
      - name: Ping production health and lottery page
        shell: bash
        run: |
          set -euo pipefail

          base_url="${LOTTERY_BASE_URL:-https://lottery.687tfjog.com}"
          base_url="${base_url%/}"

          curl --fail --silent --show-error --location --max-time 30 --retry 2 --retry-delay 5 "$base_url/health" >/dev/null
          curl --fail --silent --show-error --location --max-time 30 --retry 2 --retry-delay 5 "$base_url/lottery" >/dev/null
